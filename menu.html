<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Ugly Cookies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Chewy para nombres y Lato para descripciones -->
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Lato:wght@400;700;900&family=Montserrat:wght@700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
    html { scroll-behavior: smooth; }
    h1, h2, h3, h4, h5 { font-family: 'Chewy', system-ui; font-weight: normal; }
    body { font-family: 'Lato', sans-serif; }
    
    .font-chewy { 
        font-family: 'Chewy', system-ui; 
        text-transform: capitalize;
    }
    
    .font-lato-desc { 
        font-family: 'Lato', sans-serif; 
        letter-spacing: 0.01em; 
        font-weight: 400; 
        font-size: 1.25rem; 
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .reveal {
        opacity: 0;
        filter: blur(5px);
        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform, opacity;
    }
    .reveal.active {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
    }
</style>
</head>

<body class="bg-[#efe6da] min-h-screen">

<!-- Header -->
<header class="bg-[#512874] p-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-white font-chewy text-2xl hover:text-[#ecd3ff] transition-colors">
                ← Volver
            </a>
            <h1 class="text-white font-chewy text-3xl">Menú</h1>
        </div>
        
        <!-- Carrito Floating -->
        <div class="relative">
            <button onclick="toggleCart()" class="bg-[#a55641] text-white p-3 rounded-full shadow-lg hover:bg-[#8a4534] transition-all hover:scale-105 relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-[#fbcfe8] text-[#9d174d] text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="max-w-6xl mx-auto py-8 px-4">
    
    <!-- Sucursal Info -->
    <div class="bg-white/60 p-4 rounded-2xl mb-8 text-center">
        <p class="text-[#512874] font-bold text-lg">Sucursal seleccionada:</p>
        <p id="menu-branch-name" class="text-[#a55641] font-chewy text-2xl">...</p>
    </div>

    <!-- Products Grid - Columnas separadas -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <!-- Columna Merch -->
        <div>
            <h2 class="text-3xl font-chewy text-[#512874] mb-6 text-center">🎁 Merch</h2>
            <div id="merch-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-center text-[#a55641]">Cargando merch...</p>
            </div>
        </div>

        <!-- Columna Boxes -->
        <div>
            <h2 class="text-3xl font-chewy text-[#512874] mb-6 text-center">📦 Boxes</h2>
            <div id="boxes-container" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <p class="text-center text-[#a55641]">Cargando boxes...</p>
            </div>
        </div>

    </div>

</main>

<!-- Cart Modal -->
<div id="cart-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
            <h2 class="text-2xl font-chewy text-[#512874]">Tu Carrito</h2>
            <button onclick="toggleCart()" class="text-3xl text-[#a55641]">&times;</button>
        </div>
        
        <div id="cart-items" class="p-4 space-y-4">
            <p class="text-center text-gray-500">Tu carrito está vacío</p>
        </div>
        
        <div class="sticky bottom-0 bg-white p-4 border-t">
            <div class="flex justify-between items-center mb-4">
                <span class="font-bold text-[#512874]">Total:</span>
                <span id="cart-total" class="font-bold text-2xl text-[#a55641]">$0.00</span>
            </div>
            <button onclick="processCheckout()" class="w-full bg-[#512874] text-white font-chewy py-3 rounded-xl hover:bg-[#3a1a52] transition-all">
                Ir a Pagar
            </button>
        </div>
    </div>
</div>

<script>
// Firebase Config
const menuFirebaseConfig = {
    apiKey: "AIzaSyC3HpJ9CwSR3Z8K5NPc5qBz4gqGIrHT5vk",
    authDomain: "ugly-cookie.firebaseapp.com",
    projectId: "ugly-cookie",
    storageBucket: "ugly-cookie.firebasestorage.app",
    messagingSenderId: "848026605150",
    appId: "1:848026605150:web:99a1e0b72eee3572c606cf",
    measurementId: "G-K3MDH7HYRS"
};

// Inicializar Firebase solo si no está inicializado
if (!firebase.apps.length) {
    firebase.initializeApp(menuFirebaseConfig);
}
const db = firebase.firestore();
const auth = firebase.auth();

console.log("Firebase inicializado correctamente");
console.log("Firestore:", db);

// Variables globales
let cart = [];
let products = [];
let currentBranch = localStorage.getItem('selectedBranch') || 'pilar';

// Actualizar nombre de sucursal
const branchNames = {
    'pilar': 'Pilar',
    'canitas': 'Cañitas',
    'belgrano': 'Belgrano'
};
document.getElementById('menu-branch-name').textContent = branchNames[currentBranch] || currentBranch;

// Cargar productos
async function loadProducts() {
    const merchContainer = document.getElementById('merch-container');
    const boxesContainer = document.getElementById('boxes-container');
    
    merchContainer.innerHTML = '<p class="text-center text-[#a55641]">Cargando merch...</p>';
    boxesContainer.innerHTML = '<p class="text-center text-[#a55641]">Cargando boxes...</p>';

    console.log("Iniciando carga de productos...");
    console.log("Firebase db:", db);

    try {
        // Usar colección 'cookies' con versión compat
        db.collection('cookies').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
            console.log("Snapshot recibido, cantidad de documentos:", snapshot.size);
            merchContainer.innerHTML = '';
            boxesContainer.innerHTML = '';
            
            if (snapshot.empty) {
                console.log("No hay productos en la colección");
                merchContainer.innerHTML = '<p class="text-center text-[#a55641]">No hay productos disponibles</p>';
                boxesContainer.innerHTML = '<p class="text-center text-[#a55641]">No hay boxes disponibles</p>';
                return;
            }

            products = []; // Limpiar array
            let merchCount = 0;
            let boxCount = 0;

            snapshot.forEach(doc => {
                const product = { id: doc.id, ...doc.data() };
                console.log("Producto:", product.name, "Category:", product.category, "Available:", product.available);
                
                // Solo mostrar productos disponibles
                if (product.available === true) {
                    products.push(product);
                    
                    const imageUrl = product.image || '';
                    
                    if (product.category === 'box') {
                        // Box - Cuadrado con relieve
                        boxCount++;
                        const boxCard = document.createElement('div');
                        boxCard.className = 'bg-gradient-to-br from-[#512874] to-[#7a4f9e] p-4 rounded-2xl shadow-lg hover:shadow-2xl transition-all transform hover:scale-105 cursor-pointer border-4 border-[#512874] relative overflow-hidden';
                        boxCard.style.boxShadow = '0 10px 20px rgba(81, 40, 116, 0.3), inset 0 2px 4px rgba(255,255,255,0.1)';
                        
                        const imageHtml = imageUrl ? `<img src="${imageUrl}" alt="${product.name}" class="w-full h-24 object-cover rounded-lg mb-2">` : `<div class="text-4xl mb-2 text-center">📦</div>`;
                        
                        boxCard.innerHTML = `
                            <div class="absolute top-2 right-2 bg-[#fbcfe8] text-[#9d174d] text-xs font-bold px-2 py-1 rounded-full">
                                $${(product.price || 0).toFixed(2)}
                            </div>
                            ${imageHtml}
                            <h3 class="font-bold text-white text-sm mb-1">${product.name}</h3>
                            <p class="text-white/80 text-xs">${product.description || ''}</p>
                        `;
                        boxCard.onclick = () => addToCart(product.id);
                        boxesContainer.appendChild(boxCard);
                    } else {
                        // Merch - Tarjeta normal
                        merchCount++;
                        const merchCard = document.createElement('div');
                        merchCard.className = 'bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition-all transform hover:scale-105';
                        
                        const imageHtml = imageUrl ? `<img src="${imageUrl}" alt="${product.name}" class="w-20 h-20 object-cover rounded-lg mb-3">` : `<div class="text-4xl mb-3">�</div>`;
                        
                        merchCard.innerHTML = `
                            ${imageHtml}
                            <h3 class="font-bold text-[#512874] text-xl mb-2">${product.name}</h3>
                            <p class="text-[#a55641] text-sm mb-3">${product.description || ''}</p>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-[#a55641] text-lg">$${(product.price || 0).toFixed(2)}</span>
                                <button onclick="addToCart('${product.id}')" class="bg-[#a55641] text-white px-4 py-2 rounded-xl hover:bg-[#8a4534] transition-all font-bold">
                                    Agregar
                                </button>
                            </div>
                        `;
                        merchContainer.appendChild(merchCard);
                    }
                }
            });

            console.log("Productos disponibles encontrados - Merch:", merchCount, "Boxes:", boxCount);
            
            if (merchCount === 0) {
                merchContainer.innerHTML = '<p class="text-center text-[#a55641]">No hay merch disponible</p>';
            }
            
            if (boxCount === 0) {
                boxesContainer.innerHTML = '<p class="text-center text-[#a55641]">No hay boxes disponibles</p>';
            }
        });
    } catch (error) {
        console.error('Error al cargar productos:', error);
        merchContainer.innerHTML = '<p class="text-center text-red-500">Error al cargar productos: ' + error.message + '</p>';
        boxesContainer.innerHTML = '<p class="text-center text-red-500">Error al cargar boxes: ' + error.message + '</p>';
    }
}

// Agregar al carrito
function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;

    const existingItem = cart.find(item => item.id === productId);
    if (existingItem) {
        existingItem.quantity++;
    } else {
        cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            quantity: 1,
            emoji: product.emoji || '🍪'
        });
    }

    updateCartUI();
}

// Actualizar UI del carrito
function updateCartUI() {
    const cartCount = document.getElementById('cart-count');
    const cartItems = document.getElementById('cart-items');
    const cartTotal = document.getElementById('cart-total');

    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

    cartCount.textContent = totalItems;
    cartCount.classList.toggle('hidden', totalItems === 0);

    if (cart.length === 0) {
        cartItems.innerHTML = '<p class="text-center text-gray-500">Tu carrito está vacío</p>';
    } else {
        cartItems.innerHTML = cart.map(item => `
            <div class="flex justify-between items-center bg-[#efe6da] p-3 rounded-xl">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">${item.emoji}</span>
                    <div>
                        <p class="font-bold text-[#512874]">${item.name}</p>
                        <p class="text-sm text-[#a55641]">$${item.price.toFixed(2)}</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="updateQuantity('${item.id}', -1)" class="bg-[#512874] text-white w-8 h-8 rounded-lg hover:bg-[#3a1a52]">-</button>
                    <span class="font-bold text-[#512874]">${item.quantity}</span>
                    <button onclick="updateQuantity('${item.id}', 1)" class="bg-[#512874] text-white w-8 h-8 rounded-lg hover:bg-[#3a1a52]">+</button>
                </div>
            </div>
        `).join('');
    }

    cartTotal.textContent = `$${totalPrice.toFixed(2)}`;
}

// Actualizar cantidad
function updateQuantity(productId, delta) {
    const item = cart.find(item => item.id === productId);
    if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) {
            cart = cart.filter(i => i.id !== productId);
        }
        updateCartUI();
    }
}

// Toggle carrito
function toggleCart() {
    const modal = document.getElementById('cart-modal');
    modal.classList.toggle('hidden');
    modal.classList.toggle('flex');
}

// Procesar checkout
function processCheckout() {
    if (cart.length === 0) {
        alert('Tu carrito está vacío');
        return;
    }
    
    // Guardar carrito en localStorage y redirigir
    localStorage.setItem('cart', JSON.stringify(cart));
    window.location.href = 'index.html#checkout';
}

// Cargar productos al iniciar
loadProducts();
</script>

</body>
</html>
