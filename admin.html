<script>

// MODALES

function openProductModal() {
    document.getElementById("product-modal")?.classList.remove("hidden");
}

function closeProductModal() {
    document.getElementById("product-modal")?.classList.add("hidden");
}

window.openProductModal = openProductModal;
window.closeProductModal = closeProductModal;

// =========================
// TABS
// =========================

window.showTab = function(tabName, event) {

    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));

    document.getElementById(`tab-${tabName}`)?.classList.add('active');
    if (event?.target) event.target.classList.add('active');

};

// =========================
// PLACEHOLDERS
// =========================

window.loadUsers = () => console.log("loadUsers");
window.loadStock = () => console.log("loadStock");
window.loadPrices = () => console.log("loadPrices");

function loadBranches() {
    const container = document.getElementById("branches-list");

    db.collection("products").onSnapshot((snapshot) => {

        const branchMap = {};

        snapshot.forEach(doc => {
            const p = doc.data();
            const branches = p.visibilidadSucursales || {};

            Object.keys(branches).forEach(branch => {
                if (!branchMap[branch]) {
                    branchMap[branch] = 0;
                }

                if (branches[branch] !== false) {
                    branchMap[branch]++;
                }
            });
        });

        let html = `
            <div style="margin-bottom:20px;">
                <button onclick="addBranch()" class="btn-primary">
                    + Agregar sucursal
                </button>
            </div>
        `;

        Object.keys(branchMap).forEach(branch => {
            html += `
                <div class="stat-card" style="margin-bottom:10px;">
                    <h2>${branch}</h2>
                    <p>${branchMap[branch]} productos activos</p>
                </div>
            `;
        });

        container.innerHTML = html;
    });
}

window.loadBranches = loadBranches;

function addBranch() {
    const name = prompt("Nombre de la nueva sucursal:");

    if (!name) return;

    const branchKey = name
        .toLowerCase()
        .trim()
        .replace(/\s+/g, "_");

    db.collection("products").get().then(snapshot => {

        const batch = db.batch();

        snapshot.forEach(doc => {
            const ref = db.collection("products").doc(doc.id);

            batch.update(ref, {
                [`visibilidadSucursales.${branchKey}`]: true
            });
        });

        return batch.commit();
    }).then(() => {
        alert("Sucursal agregada correctamente");
    }).catch(err => {
        console.error(err);
        alert("Error al agregar sucursal");
    });
}

window.addBranch = addBranch;

// FIREBASE AUTH (LOGIN FIX)
// =========================

document.addEventListener("DOMContentLoaded", () => {

    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    document.getElementById("login-button").addEventListener("click", async () => {
        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;

            document.getElementById("admin-email-display").textContent = user.email;

            document.getElementById("login-view").classList.add("hidden");
            document.getElementById("admin-panel").classList.remove("hidden");

            loadDashboard();

        } catch (error) {
            console.error("Error login:", error);
            document.getElementById("login-error").classList.remove("hidden");
        }
    });

    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById("login-view").classList.add("hidden");
            document.getElementById("admin-panel").classList.remove("hidden");

            document.getElementById("admin-email-display").textContent = user.email;

            loadDashboard();
        } else {
            document.getElementById("login-view").classList.remove("hidden");
            document.getElementById("admin-panel").classList.add("hidden");
        }
    });

    document.getElementById("btn-logout").addEventListener("click", () => {
        auth.signOut();
    });

});

        function loadProducts() {
            const container = document.getElementById('products-container');
db.collection('products').onSnapshot((snapshot) => {
    container.innerHTML = '';

    if (snapshot.empty) {
        container.innerHTML = '<p class="text-gray-600 text-center py-8">No hay productos creados.</p>';
        return;
    }

    snapshot.forEach((doc) => {

        const product = doc.data();

        const visibleWeb = product.visibleWeb !== false;
        const visiblePilar = product.visibilidadSucursales?.pilar !== false;
        const visibleSanIsidro = product.visibilidadSucursales?.sanIsidro !== false;

                    🗑️
                </button>
            </div>
        `;

});
} // 👈 ESTE ES EL QUE TE FALTABA

        function showProductModal(productId = null) {
    const modal = document.getElementById('product-modal');
    const form = document.getElementById('product-form');
    const title = document.getElementById('modal-title');

    if (!modal || !form) {
        console.error("Modal o form no encontrado en el DOM");
        return;
    }

    form.reset();
    const idInput = document.getElementById('product-id');
    if (idInput) idInput.value = '';

    document.body.style.overflow = 'hidden';

    if (title) {
        title.textContent = productId ? 'Editar Registro' : 'Nueva Cookie';
    }

    if (productId) {
        db.collection('products').doc(productId).get().then((doc) => {
            if (!doc.exists) return;

            const product = doc.data();

            document.getElementById('product-id').value = productId;
            document.getElementById('product-type').value = product.tipo || 'producto';
            document.getElementById('product-name').value = product.name || '';
            document.getElementById('product-description').value = product.description || '';
            document.getElementById('product-price').value = product.price || 0;
        });
    }

    modal.classList.remove('hidden');
}

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
            // DEVUELVE EL SCROLL NORMAL A LA PÁGINA
            document.body.style.overflow = 'auto'; 
        }

        function editProduct(productId) {
            showProductModal(productId);
        }

        function deleteProduct(productId) {
            if (confirm('¿Estás seguro de eliminar este producto por completo de la base general?')) {
                db.collection('products').doc(productId).delete()
                    .then(() => alert('Producto eliminado correctamente'))
                    .catch(error => {
                        console.error("Error delete:", error);
                        alert("Error al eliminar producto");
                    });
            }
        }
// ============================================
// FORMULARIO DE PRODUCTO (ADMINISTRACIÓN GENERAL)
// ============================================

document.getElementById('product-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const productId = document.getElementById('product-id').value;

    const productData = {
        tipo: document.getElementById('product-type').value,
        name: document.getElementById('product-name').value.trim(),
        description: document.getElementById('product-description').value.trim(),
        price: parseFloat(document.getElementById('product-price').value) || 0,

        visibleWeb: document.getElementById('product-visible-web')?.checked ?? true,

        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {

        if (productId) {

            await db.collection('products')
                .doc(productId)
                .update(productData);

            alert('Producto actualizado con éxito');

        } else {

            productData.createdAt =
                firebase.firestore.FieldValue.serverTimestamp();

            productData.visibilidadSucursales = {
                pilar: true,
                sanIsidro: true
            };

            await db.collection('products')
                .add(productData);

            alert('Producto creado con éxito');
        }

        closeProductModal();

        document.getElementById('product-form').reset();
        document.getElementById('product-id').value = '';

    } catch (error) {

        console.error("Error al guardar producto en Firestore:", error);
        alert("Error al guardar el producto");
    }
});

        await db.collection('products')

    } catch (error) {

}

// ============================================

function loadStock() {
    const tbody = document.getElementById('stock-table-body');

    db.collection('products')
        .orderBy('name')
        .onSnapshot((snapshot) => {

            tbody.innerHTML = '';

            if (snapshot.empty) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-8">
                            No hay productos cargados.
                        </td>
                    </tr>
                `;
                return;
            }

            snapshot.forEach((doc) => {

                const product = doc.data();

                const visibleWeb = product.visibleWeb !== false;
                const visiblePilar = product.visibilidadSucursales?.pilar !== false;
                const visibleSanIsidro = product.visibilidadSucursales?.sanIsidro !== false;

                const row = document.createElement('tr');

                row.innerHTML = `
                    <td class="font-bold">
                        <span class="text-xs uppercase bg-purple-100 px-2 py-1 rounded mr-2 text-purple-700 font-sans">
                            ${product.tipo || 'producto'}
                        </span>
                        ${product.name || ''}
                    </td>

                    <td class="font-bold">
                        $${product.price || 0}
                    </td>

                    <td>
                        <span class="status-badge ${(visibleWeb || visiblePilar || visibleSanIsidro) ? 'active' : 'inactive'}">
                            ${(visibleWeb || visiblePilar || visibleSanIsidro) ? 'Activo' : 'Inactivo'}
                        </span>
                    </td>

                    <td>
                        <button onclick="editProduct('${doc.id}')" class="btn-primary text-sm">
                            Editar
                        </button>
                    </td>
                `;

                tbody.appendChild(row);
            });
        });
}

        // GESTIÓN DE PRECIOS UNIFICADOS
        // ============================================
        function loadPrices() {
            const tbody = document.getElementById('prices-table-body');
            db.collection('products').onSnapshot((snapshot) => {
                tbody.innerHTML = '';
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-8">No hay productos para mostrar precios.</td></tr>';
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const product = doc.data();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="font-bold">${product.name}</td>
                        <td>
                            <input type="number" class="form-control price-input" data-id="${doc.id}" 
                                   value="${product.price || 0}" step="0.01" style="width: 140px;">
                        </td>
                        <td>
                            <button onclick="editProduct('${doc.id}')" class="btn-primary text-sm">Editar Todo</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }

        async function saveAllPrices() {
            const inputs = document.querySelectorAll('.price-input');
            const updates = [];
            
            inputs.forEach(input => {
                const productId = input.dataset.id;
                const value = parseFloat(input.value) || 0;
                
                updates.push(
                    db.collection('products').doc(productId).update({
                        price: value
                    })
                );
            });
            
            try {
                await Promise.all(updates);
                alert('Precios generales actualizados correctamente');
            } catch (error) {
                console.error("Error al guardar los precios masivos:", error);
                alert("Error al guardar los nuevos precios");
            }
        }


               // ============================================
        // ESTADÍSTICAS REESCRITAS (ADAPTADAS AL NUEVO SISTEMA)
        // ============================================
        function loadStats() {
            // Contar productos totales
            db.collection('products').get().then(snapshot => {
                document.getElementById('stat-total-products').textContent = snapshot.size;
                
                let activeCount = 0;
                let totalDisponiblesMostrador = 0;
                
                snapshot.forEach(doc => {
                    const product = doc.data();
                    
                    // Obtenemos los estados individuales por sucursal
                    const visiblePilar = product.visibilidadSucursales?.pilar !== false;
                    const visibleSanIsidro = product.visibilidadSucursales?.sanIsidro !== false;
                    
                    // Un producto cuenta como activo general si está visible en al menos una sucursal
                    if (visiblePilar || visibleSanIsidro) {
                        activeCount++;
                    }
                    
                    // Sumamos cuántas "disponibilidades de mostrador" hay activas en toda la empresa
                    if (visiblePilar) totalDisponiblesMostrador++;
                    if (visibleSanIsidro) totalDisponiblesMostrador++;
                });
                
                document.getElementById('stat-active-products').textContent = activeCount;
                
                // Reutilizamos el cuadro de stock viejo para mostrar cuántos ítems están listos en mostrador
                document.getElementById('stat-total-stock').textContent = totalDisponiblesMostrador;
            }).catch(error => {
                console.error("Error al cargar estadísticas de productos:", error);
            });
            
            // Contar usuarios de Firebase
            db.collection('users').get().then(snapshot => {
                document.getElementById('stat-total-users').textContent = snapshot.size;
            }).catch(error => {
                console.error("Error al cargar estadísticas de usuarios:", error);
            });
        }

        // ============================================
        // USUARIOS (SE MANTIENE LIMPIO Y OPTIMIZADO)
        // ============================================
        function loadUsers() {
            const tbody = document.getElementById('users-table-body');
            db.collection('users').onSnapshot((snapshot) => {
                tbody.innerHTML = '';
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8">No hay usuarios registrados.</td></tr>';
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const user = doc.data();
                    const row = document.createElement('tr');
                    
                    // Manejo seguro por si Firebase no cargó el timestamp del último login
                    const lastLogin = user.lastLogin && user.lastLogin.seconds 
                        ? new Date(user.lastLogin.seconds * 1000).toLocaleDateString() 
                        : 'N/A';
                    
                    row.innerHTML = `
                        <td class="font-bold">${user.name || 'Usuario'}</td>
                        <td>${user.email}</td>
                        <td class="capitalize">${user.branch || 'General'}</td>
                        <td>${lastLogin}</td>
                        <td>
                            <span class="status-badge active bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold">
                                ${user.role || 'Cliente'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }, error => {
                console.error("Error en tiempo real de usuarios:", error);
            });
        }

        function refreshUsers() {
            loadUsers();
        }
        
 </script>
