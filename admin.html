<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugly Cookies - Panel Admin</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- Firebase SDK (Compat v9 para asegurar estabilidad con tu código anterior) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        /* --- ESTILOS NATIVOS DE INTERFAZ PROFESIONAL --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; background-color: #f4edd4; padding: 20px; color: #333; }
        .font-chewy { font-family: 'Chewy', system-ui; }
        .hidden { display: none !important; }

        .max-container { max-width: 1300px; margin: 0 auto; width: 100%; }
        
        /* Pantalla de Login de respaldo (Oculta nativamente) */
        .login-box { max-width: 400px; margin: 100px auto 0; background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .error-msg { color: #e11d48; font-weight: bold; margin-top: 15px; font-size: 0.9rem; }

        /* Botones */
        .btn-primary { width: 100%; background-color: #512874; color: white; border: none; padding: 14px; border-radius: 15px; font-size: 1.2rem; cursor: pointer; transition: transform 0.2s; }
        .btn-logout { background: white; color: #a55641; border: 1px solid rgba(165, 86, 65, 0.3); font-weight: bold; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.8rem; }
        .btn-logout:hover { background: #fff1f2; color: #e11d48; border-color: #fecdd3; }

        /* Header */
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; margin-bottom: 25px; }
        .header-panel h1 { font-size: 2.2rem; color: #512874; }
        .header-panel p { font-size: 0.8rem; color: #a55641; font-weight: bold; margin-top: 2px; }

        /* Estructura de Dos Columnas (Estilo Refe) */
        .admin-layout { display: grid; grid-template-columns: 1fr; gap: 25px; align-items: start; }
        @media (min-width: 992px) {
            .admin-layout { grid-template-columns: 5fr 7fr; }
        }

        /* Columna Izquierda: Lista de Cookies */
        .products-list { display: flex; flex-direction: column; gap: 15px; max-height: calc(100vh - 160px); overflow-y: auto; padding-right: 5px; }
        .products-list::-webkit-scrollbar { width: 6px; }
        .products-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Tarjeta de Cookie Individual */
        .cookie-card { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.06); position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 12px; }
        .card-sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }
        .bg-visible { background-color: #10b981; }
        .bg-hidden { background-color: #f59e0b; }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; padding-left: 8px; }
        .card-title-id { font-size: 0.9rem; font-weight: bold; color: #512874; }
        .card-title-id span { font-weight: normal; color: #888; font-size: 0.75rem; text-transform: capitalize; }
        
        /* Status Badge */
        .status-badge { font-size: 0.75rem; font-weight: bold; padding: 5px 10px; border-radius: 8px; cursor: pointer; border: 1px solid; }
        .status-active { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
        .status-inactive { background: #fffbeb; color: #b45309; border-color: #fde68a; }

        /* Inputs de Tarjetas */
        .card-inputs { padding-left: 8px; display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 0.65rem; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .form-control { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.85rem; background: #fafafa; font-family: inherit; }
        .form-control:focus { outline: none; border-color: #512874; background: #fff; }
        .form-control.bold-title { font-weight: bold; font-size: 0.95rem; color: #222; text-transform: capitalize; }

        /* Columna Derecha: Panel de Carga Fijo */
        .sticky-column { position: relative; }
        @media (min-width: 992px) {
            .sticky-column { position: sticky; top: 20px; }
        }
        
        /* Caja de Línea de Puntos */
        .dashed-box { background-color: #faf6e8; border-radius: 40px; border: 4px dashed #512874; padding: 30px 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        .dashed-box-header { display: inline-flex; align-items: center; gap: 10px; background: white; padding: 8px 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #eee; }
        .dashed-box-header h2 { font-size: 1.5rem; color: #512874; }
        
        .form-container-main { background: white; padding: 20px; border-radius: 20px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 15px; }
        .btn-secondary { width: 100%; background-color: #a55641; color: white; border: none; padding: 12px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; }
        .btn-secondary:hover { background-color: #bd634b; }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN (Oculta nativamente para evitar parpadeos) -->
    <div id="login-view" class="login-box" style="display: none !important;">
        <p id="login-error" class="error-msg">Acceso denegado. No eres administrador.</p>
    </div>

    <!-- PANEL PRINCIPAL AUTENTICADO -->
    <div id="admin-panel" class="max-container hidden">
        
        <!-- Encabezado Superior -->
        <div class="header-panel">
            <div>
                <h1 class="font-chewy">Carta General</h1>
                <p id="admin-email-display"></p>
            </div>
            <button id="btn-logout" class="btn-logout">
                Cerrar Sesión
            </button>
        </div>

        <!-- Estructura de Dos Columnas -->
        <div class="admin-layout">
            
            <!-- COLUMNA IZQUIERDA: Lista de cookies individuales -->
            <div class="products-list" id="products-container">
                <!-- Se inyecta dinámicamente -->
            </div>

            <!-- COLUMNA DERECHA: Formulario Mostrador Estilo Crumbl -->
            <div class="sticky-column">
                <div class="dashed-box">
                    
                    <div class="dashed-box-header">
                        <span>✨</span>
                        <h2 class="font-chewy">Agregar Nueva Cookie</h2>
                    </div>

                    <div class="form-container-main">
                        <div class="input-group">
                            <label for="new-name">Nombre Identificador</label>
                            <input type="text" id="new-name" placeholder="Ej: Nutela Boom o Cucu" class="form-control">
                        </div>
                        
                        <div class="input-group">
                            <label for="new-desc">Descripción de la Receta</label>
                            <textarea id="new-desc" rows="3" placeholder="Detalla los ingredientes que verá el público..." class="form-control" style="resize:none;"></textarea>
                        </div>

                        <button id="btn-add" class="btn-secondary font-chewy">
                            Crear e Insertar en Lista
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU FIREBASE (Reemplaza con tus datos de conexión reales de Firebase)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };
        
        // Inicializar Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Elementos de la interfaz
        const loginView = document.getElementById('login-view');
        const adminPanel = document.getElementById('admin-panel');
        const btnLogout = document.getElementById('btn-logout');
        const loginError = document.getElementById('login-error');
        const adminEmailDisplay = document.getElementById('admin-email-display');
        const productsContainer = document.getElementById('products-container');

       // ============================================
// OBSERVADOR DE ESTADO DE AUTENTICACIÓN (INDEX)
// ============================================
auth.onAuthStateChanged(async (user) => {
    currentUser = user;
    const authButton = document.getElementById('auth-button-menu');

    if (user) {
        // Si el usuario ya está logueado, cambiamos el texto del botón del menú
        authButton.textContent = '👤 Ir a Panel Admin';
        
        // Configuramos el botón para que, si es tu correo, te mande al admin al hacer CLIC
        authButton.onclick = () => {
            if (user.email === 'agustinalonso2303@gmail.com') {
                window.location.href = 'admin.html';
            } else {
                // Aquí puedes poner la lógica normal de perfil para clientes si la tienes
                alert('Sesión activa como cliente.');
            }
        };

        // Lógica secundaria de rangos locales que ya tenías
        const userDoc = await db.collection('users').doc(user.uid).get();
        const userData = userDoc.exists ? userDoc.data() : {};
        if (user.email === 'cookiespilar@gmail.com' || userData.role === 'admin_pilar') {
            if (typeof enableEditMode === 'function') enableEditMode();
        }
    } else {
        // Si no está logueado, el botón funciona para abrir el flujo de Google clásico
        authButton.textContent = 'Iniciar Sesión';
        authButton.onclick = () => {
            // Reemplaza esto con el nombre exacto de tu función de Login si es diferente
            if (typeof handleAuthClickFromMenu === 'function') {
                handleAuthClickFromMenu();
            } else {
                // Alternativa directa si usas provider popup en línea
                auth.signInWithPopup(provider).catch(e => console.error(e));
            }
        };
    }
});

    // --- EVENTOS DE BOTONES ---

    // Cerrar sesión y volver de inmediato a la web principal
     if (btnLogout) {
        btnLogout.addEventListener('click', async () => {
            try {
                await auth.signOut();
                window.location.href = 'index.html';
            } catch (e) {
                console.error("Error Logout:", e);
            }
        });
    }
    // Guardar Nueva Cookie en Firestore
    const btnAdd = document.getElementById('btn-add');
    if (btnAdd) {
        btnAdd.addEventListener('click', async () => {
            const nameInput = document.getElementById('new-name');
            const descInput = document.getElementById('new-desc');
            if (!nameInput || !nameInput.value.trim()) {
                alert('Falta colocar el nombre de la cookie');
                return;
            }
            try {
                await db.collection('products').add({
                    name: nameInput.value.trim(),
                    description: descInput ? descInput.value.trim() : "",
                    isVisible: false // Se guarda oculta por defecto para revisión
                });
                nameInput.value = '';
                if (descInput) descInput.value = '';
                alert('Cookie creada exitosamente.');
            } catch (error) {
                console.error("Error al crear producto:", error);
                alert('Error al guardar en Firestore');
            }
        });
    }
// --- PROCESOS DE DATOS EN TIEMPO REAL ---
 function loadProductsRealtime() {
    db.collection('products').onSnapshot((snapshot) => {
        productsContainer.innerHTML = '';
        if(snapshot.empty) {
            productsContainer.innerHTML = 'No hay cookies cargadas en el sistema.';
            return;
        }
        snapshot.forEach((doc) => {
            const product = doc.data();
            const id = doc.id;
            const card = document.createElement('div');
            card.className = "cookie-card";
            card.innerHTML = `🍪 ID: ${id.substring(0,6)}...${product.isVisible ? '🟢 Activo' : '🟠 Oculto'}Nombre ComercialDescripción de Carta${product.description || ''}`;
            productsContainer.appendChild(card);
        });
    });
}
// Funciones de actualización instantánea (onchange) al salir del input
window.toggleProductVisibility = async function(id, currentVisible) {
    try {
        await db.collection('products').doc(id).update({ isVisible: !currentVisible });
    } catch (e) {
        console.error(e);
    }
};
window.updateProductName = async function(id, newName) {
    if (!newName.trim()) return;
    try {
        await db.collection('products').doc(id).update({ name: newName.trim() });
    } catch (e) {
        console.error(e);
    }
};
window.updateProductDescription = async function(id, newDescription) {
    try {
        await db.collection('products').doc(id).update({ description: newDescription.trim() });
    } catch (e) {
        console.error(e);
    }
};
